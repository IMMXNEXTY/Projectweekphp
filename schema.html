<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Weekplanning Ridderweek</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:0;
}

header{
    background:#8b0000;
    color:white;
    text-align:center;
    padding:20px;
}

table{
    width:80%;
    margin:40px auto;
    border-collapse:collapse;
    background:white;
}

th, td{
    border:1px solid #ccc;
    padding:15px;
    text-align:center;
}

th{
    background:#333;
    color:white;
}

tr:nth-child(even){
    background:#f2f2f2;
}
</style>

</head>

<body>

<header>
<h1>🏰 Ridderweek Planning</h1>
<p>Activiteiten van maandag t/m vrijdag</p>
</header>

<table>
<tr>
<th>Dag</th>
<th>Ochtend</th>
<th>Middag</th>
</tr>

<tr>
<td>Maandag</td>
<td>Knutselen – ridderslingers</td>
<td>Zandkastelen maken</td>
</tr>

<tr>
<td>Dinsdag</td>
<td>Kastelen tekenen</td>
<td>Levend Stratego</td>
</tr>

<tr>
<td>(Bom)Woensdag</td>
<td>Bond-trefbal</td>
<td>Bomtikkertje</td>
</tr>

<tr>
<td>Donderdag</td>
<td>Mike vertelt (Ridder Mike)</td>
<td>Capture the Flag</td>
</tr>

<tr>
<td>Vrijdag</td>
<td>Bouncy Castle</td>
<td>VrijMiBo
</td>
</tr>

</table>

</body>
</html>
